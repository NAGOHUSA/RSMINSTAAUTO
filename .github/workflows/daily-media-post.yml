name: Daily Media Post Schedule

on:
  schedule:
    # Runs at 9 AM EST (14:00 UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-media:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dateutil instagrapi
    
    - name: Create required directories
      run: |
        mkdir -p logs
        mkdir -p data/processed_posts
        mkdir -p assets
    
    - name: Run media post
      env:
        INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
        INSTAGRAM_CSRF_TOKEN: ${{ secrets.INSTAGRAM_CSRF_TOKEN }}
      run: |
        python github_actions_post.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: post-activity-logs
        path: logs/
        retention-days: 7
    
    - name: Upload processed posts data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: processed-posts-data
        path: data/processed_posts/
        retention-days: 7
