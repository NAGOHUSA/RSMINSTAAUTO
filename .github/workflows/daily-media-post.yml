name: Daily Media Post Schedule

on:
  schedule:
    # Runs at 9 AM EST (14:00 UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch:
  # Allows manual trigger from GitHub UI

env:
  # Opt into Node.js 24 for all JavaScript actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-media:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      # v4 currently uses Node.js 20, but will be updated
      # Check for v5 if available by June 2026
    
    - name: Set up Python
      uses: actions/setup-python@v5
      # v5 uses Node.js 20, check for v6 closer to June 2026
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dateutil
        # Add any other dependencies your media posting needs
        # pip install requests instagrapi or whatever you use
    
    - name: Create required directories
      run: |
        mkdir -p logs
        mkdir -p data/scheduled_posts
        mkdir -p src/scripts
        mkdir -p assets
    
    - name: Make scripts executable
      run: |
        chmod +x src/scripts/*.sh 2>/dev/null || true
        chmod +x src/scripts/*.fish 2>/dev/null || true
    
    - name: Run media post
      env:
        SHELL: /bin/bash
        # Add any API keys or credentials as GitHub Secrets
        # INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        # INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
      run: |
        python github_actions_post.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      # v4 uses Node.js 20, check for v5 by June 2026
      with:
        name: post-activity-logs
        path: logs/
        retention-days: 7
    
    - name: Upload processed posts data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: processed-posts-data
        path: data/processed_posts/
        retention-days: 7
