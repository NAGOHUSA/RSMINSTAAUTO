name: Daily Media Post Schedule

on:
  schedule:
    # Runs at 9 AM EST (14:00 UTC) every day
    # Note: EST is UTC-5, so 9 AM EST = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allows manual triggering of the workflow

jobs:
  run-media-post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Also update checkout to v4 for best practices
    
    - name: Set up Python
      uses: actions/setup-python@v5  # Update to v5 for Python setup
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-crontab python-dateutil
        # Add any other dependencies your script needs
        # pip install -r requirements.txt  # If you have a requirements file
    
    - name: Create required directories
      run: |
        mkdir -p logs
        mkdir -p data/scheduled_posts
    
    - name: Run media post scheduler
      env:
        # Add any environment variables your script needs
        # For example:
        # INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        # INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        SHELL: /bin/bash
      run: |
        main.py  # Replace with your actual script filename
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4  # Changed from v3 to v4
      with:
        name: post-activity-logs
        path: logs/
        retention-days: 7
    
    - name: Upload scheduled posts data
      if: always()
      uses: actions/upload-artifact@v4  # Changed from v3 to v4
      with:
        name: scheduled-posts-data
        path: data/scheduled_posts/
        retention-days: 7
